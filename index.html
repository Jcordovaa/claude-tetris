<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <div class="theme-toggle">
      <span class="label">DARK</span>
      <label class="switch">
        <input type="checkbox" id="theme-switch" aria-label="Cambiar tema claro/oscuro" />
        <span class="slider"></span>
      </label>
      <span class="label">LIGHT</span>
    </div>

    <h1 class="game-title">
      <span class="letter letter-i">T</span>
      <span class="letter letter-o">E</span>
      <span class="letter letter-t">T</span>
      <span class="letter letter-s">R</span>
      <span class="letter letter-z">I</span>
      <span class="letter letter-j">S</span>
    </h1>

    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> pausa</li>
          </ul>
        </div>

        <div class="panel-section controls">
          <span class="label">POWER-UPS</span>
          <ul>
            <li>💣 Bomba: destruye un área 3×3</li>
            <li>⚡ Rayo: limpia fila y columna</li>
          </ul>
        </div>

        <div class="panel-section">
          <span class="label">MEJOR COMBO</span>
          <span class="value" id="best-combo">0</span>
        </div>
        <div class="panel-section">
          <span class="label">MAX LÍNEAS</span>
          <span class="value" id="max-lines">0</span>
        </div>

        <div class="panel-section">
          <span class="label">RECORDS</span>
          <div id="highscores-list" class="highscores"></div>
          <button id="reset-records-btn" class="link-btn">Reiniciar récords</button>
        </div>
      </aside>
    </div>

    <div id="overlay" class="overlay hidden">
      <div class="overlay-box">
        <p id="overlay-title">GAME OVER</p>
        <p id="overlay-score"></p>

        <div id="save-score-section" class="hidden">
          <span class="label">¡NUEVO RÉCORD! INGRESA TU NOMBRE</span>
          <div class="save-score-row">
            <input type="text" id="player-name" maxlength="12" placeholder="AAA" autocomplete="off" />
            <button id="save-score-btn">Guardar</button>
          </div>
        </div>

        <div class="overlay-highscores">
          <span class="label">RECORDS</span>
          <div id="overlay-highscores" class="highscores"></div>
        </div>

        <button id="restart-btn">Reiniciar</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
